<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="dgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3c14b"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#e11d2a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e11d2a" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- glass tile -->
  <rect width="32" height="32" rx="8" fill="#0b0809"/>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- subtle top sheen, like the site's glass -->
  <rect x="3" y="3" width="26" height="12" rx="6" fill="#ffffff" opacity="0.06"/>
  <!-- the "D", drawn as a path with an evenodd cut-out -->
  <path fill-rule="evenodd" fill="url(#dgrad)"
        d="M10 7 H17 A9 9 0 0 1 17 25 H10 Z M13.4 11 H16 A5 5 0 0 1 16 21 H13.4 Z"/>
</svg>
